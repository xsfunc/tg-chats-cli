name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Verify
        run: |
          mise run lint
          mise run test

      - name: Build archives
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          mkdir -p dist

          build() {
            goarch="$1"
            mise_arch="$2"
            target="tg-arc_${version}_linux_${mise_arch}"

            mkdir -p "dist/${target}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "dist/${target}/tg-arc" \
              ./cmd/tg-arc

            tar -C "dist/${target}" -czf "dist/${target}.tar.gz" tg-arc
          }

          build amd64 x64
          build arm64 arm64

          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz dist/checksums.txt \
              --title "${TAG}" \
              --generate-notes
          fi
